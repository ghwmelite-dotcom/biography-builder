<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1100" width="800" height="1100">
  <defs>
    <linearGradient id="bookBg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#1B4332"/>
      <stop offset="50%" stop-color="#163A2B"/>
      <stop offset="100%" stop-color="#0F2E20"/>
    </linearGradient>
    <linearGradient id="bkGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0C86C"/>
      <stop offset="50%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#A08030"/>
    </linearGradient>
    <linearGradient id="bkGoldV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0C86C"/>
      <stop offset="50%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#A08030"/>
    </linearGradient>
    <radialGradient id="bookGlow" cx="50%" cy="35%" r="45%">
      <stop offset="0%" stop-color="#2A5A42" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="bkShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="goldGlow2">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bkTextGlow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#C9A84C" flood-opacity="0.3"/>
    </filter>
    <!-- Leaf pattern for border -->
    <pattern id="leafPattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M20,5 Q25,20 20,35 Q15,20 20,5Z" fill="none" stroke="#C9A84C" stroke-width="0.3" opacity="0.15"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="1100" fill="#0A0A0A"/>

  <!-- Booklet body -->
  <g filter="url(#bkShadow)">
    <rect x="100" y="80" width="600" height="900" rx="4" fill="url(#bookBg)"/>
  </g>
  <rect x="100" y="80" width="600" height="900" rx="4" fill="url(#bookGlow)"/>

  <!-- Spine highlight -->
  <rect x="100" y="80" width="8" height="900" rx="2" fill="#0F2E20" opacity="0.5"/>

  <!-- Gold leaf border - outer -->
  <rect x="118" y="100" width="564" height="860" rx="3" fill="none" stroke="url(#bkGold)" stroke-width="2"/>
  <!-- Gold leaf border - inner -->
  <rect x="128" y="110" width="544" height="840" rx="2" fill="none" stroke="url(#bkGold)" stroke-width="0.6"/>

  <!-- Leaf pattern overlay on border area -->
  <rect x="118" y="100" width="564" height="860" rx="3" fill="url(#leafPattern)" opacity="0.5"/>

  <!-- Corner leaf ornaments - Top Left -->
  <g transform="translate(128, 110)" fill="none" stroke="#C9A84C">
    <path d="M0,50 Q0,0 50,0" stroke-width="1.5"/>
    <path d="M8,35 Q8,8 35,8" stroke-width="0.8"/>
    <!-- Leaf shapes -->
    <path d="M3,22 Q12,12 22,3" stroke-width="0.5"/>
    <path d="M5,12 Q10,5 18,2" stroke-width="0.4" opacity="0.6"/>
    <path d="M12,5 C8,8 5,12 3,18" stroke-width="0.4" opacity="0.6"/>
    <circle cx="6" cy="6" r="3" fill="#C9A84C" opacity="0.25" stroke="none"/>
    <!-- Tiny leaf -->
    <path d="M15,3 Q18,-2 22,3 Q18,1 15,3Z" fill="#C9A84C" opacity="0.15" stroke="none"/>
    <path d="M3,15 Q-2,18 3,22 Q1,18 3,15Z" fill="#C9A84C" opacity="0.15" stroke="none"/>
  </g>

  <!-- Corner leaf ornaments - Top Right -->
  <g transform="translate(672, 110) scale(-1,1)" fill="none" stroke="#C9A84C">
    <path d="M0,50 Q0,0 50,0" stroke-width="1.5"/>
    <path d="M8,35 Q8,8 35,8" stroke-width="0.8"/>
    <path d="M3,22 Q12,12 22,3" stroke-width="0.5"/>
    <circle cx="6" cy="6" r="3" fill="#C9A84C" opacity="0.25" stroke="none"/>
    <path d="M15,3 Q18,-2 22,3 Q18,1 15,3Z" fill="#C9A84C" opacity="0.15" stroke="none"/>
    <path d="M3,15 Q-2,18 3,22 Q1,18 3,15Z" fill="#C9A84C" opacity="0.15" stroke="none"/>
  </g>

  <!-- Corner leaf ornaments - Bottom Left -->
  <g transform="translate(128, 950) scale(1,-1)" fill="none" stroke="#C9A84C">
    <path d="M0,50 Q0,0 50,0" stroke-width="1.5"/>
    <path d="M8,35 Q8,8 35,8" stroke-width="0.8"/>
    <path d="M3,22 Q12,12 22,3" stroke-width="0.5"/>
    <circle cx="6" cy="6" r="3" fill="#C9A84C" opacity="0.25" stroke="none"/>
  </g>

  <!-- Corner leaf ornaments - Bottom Right -->
  <g transform="translate(672, 950) scale(-1,-1)" fill="none" stroke="#C9A84C">
    <path d="M0,50 Q0,0 50,0" stroke-width="1.5"/>
    <path d="M8,35 Q8,8 35,8" stroke-width="0.8"/>
    <path d="M3,22 Q12,12 22,3" stroke-width="0.5"/>
    <circle cx="6" cy="6" r="3" fill="#C9A84C" opacity="0.25" stroke="none"/>
  </g>

  <!-- Large ornate cross -->
  <g transform="translate(400, 280)" filter="url(#goldGlow2)">
    <rect x="-4" y="-55" width="8" height="110" rx="2" fill="url(#bkGoldV)"/>
    <rect x="-30" y="-25" width="60" height="8" rx="2" fill="url(#bkGold)"/>
    <!-- Cross decorative ends -->
    <circle cx="0" cy="-55" r="4" fill="#C9A84C" opacity="0.6"/>
    <circle cx="0" cy="55" r="4" fill="#C9A84C" opacity="0.6"/>
    <circle cx="-30" cy="-21" r="4" fill="#C9A84C" opacity="0.6"/>
    <circle cx="30" cy="-21" r="4" fill="#C9A84C" opacity="0.6"/>
    <!-- Inner cross detail -->
    <rect x="-1" y="-45" width="2" height="90" rx="0.5" fill="#E0C86C" opacity="0.3"/>
    <rect x="-22" y="-22" width="44" height="2" rx="0.5" fill="#E0C86C" opacity="0.3"/>
  </g>

  <!-- Ornamental divider -->
  <g transform="translate(400, 365)">
    <line x1="-140" y1="0" x2="-15" y2="0" stroke="#C9A84C" stroke-width="0.8"/>
    <line x1="15" y1="0" x2="140" y2="0" stroke="#C9A84C" stroke-width="0.8"/>
    <path d="M-12,-6 L0,0 L12,-6" fill="none" stroke="#C9A84C" stroke-width="0.8"/>
    <path d="M-12,6 L0,0 L12,6" fill="none" stroke="#C9A84C" stroke-width="0.8"/>
    <circle cx="0" cy="0" r="2" fill="#C9A84C"/>
  </g>

  <!-- ORDER OF SERVICE -->
  <text x="400" y="420" text-anchor="middle" font-family="Georgia, 'Palatino Linotype', serif" font-size="16" fill="#C9A84C" letter-spacing="8" filter="url(#bkTextGlow)">ORDER OF SERVICE</text>

  <!-- Subtle line -->
  <line x1="250" y1="440" x2="550" y2="440" stroke="#C9A84C" stroke-width="0.3" opacity="0.4"/>

  <!-- "In Celebration of the Life of" -->
  <text x="400" y="500" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#C9A84C" opacity="0.6" font-style="italic">In Celebration of the Life of</text>

  <!-- Name -->
  <text x="400" y="560" text-anchor="middle" font-family="Georgia, 'Palatino Linotype', serif" font-size="38" fill="#C9A84C" filter="url(#bkTextGlow)" font-weight="bold">Grace Amara</text>
  <text x="400" y="605" text-anchor="middle" font-family="Georgia, 'Palatino Linotype', serif" font-size="38" fill="#C9A84C" filter="url(#bkTextGlow)" font-weight="bold">Johnson</text>

  <!-- Ornamental divider -->
  <g transform="translate(400, 640)">
    <line x1="-100" y1="0" x2="-8" y2="0" stroke="#C9A84C" stroke-width="0.6"/>
    <line x1="8" y1="0" x2="100" y2="0" stroke="#C9A84C" stroke-width="0.6"/>
    <path d="M-6,0 L0,-5 L6,0 L0,5 Z" fill="#C9A84C" opacity="0.5"/>
  </g>

  <!-- Dates -->
  <text x="400" y="685" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#C9A84C" opacity="0.7" letter-spacing="1">Sunrise: March 12, 1950</text>
  <text x="400" y="715" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#C9A84C" opacity="0.7" letter-spacing="1">Sunset: January 8, 2025</text>

  <!-- Another divider -->
  <g transform="translate(400, 755)">
    <line x1="-80" y1="0" x2="-5" y2="0" stroke="#C9A84C" stroke-width="0.4"/>
    <line x1="5" y1="0" x2="80" y2="0" stroke="#C9A84C" stroke-width="0.4"/>
    <circle cx="0" cy="0" r="2" fill="#C9A84C" opacity="0.4"/>
  </g>

  <!-- Venue -->
  <text x="400" y="795" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#C9A84C" opacity="0.5" letter-spacing="3">SERVICE</text>
  <text x="400" y="822" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#C9A84C" opacity="0.8">Grace Community Chapel</text>
  <text x="400" y="847" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#C9A84C" opacity="0.5">Saturday, January 18, 2025 at 10:00 AM</text>

  <!-- Bottom flourish -->
  <g transform="translate(400, 900)">
    <path d="M-60,0 Q-30,-12 0,0 Q30,-12 60,0" fill="none" stroke="#C9A84C" stroke-width="0.7" opacity="0.4"/>
    <path d="M-35,5 Q-17,-5 0,5 Q17,-5 35,5" fill="none" stroke="#C9A84C" stroke-width="0.5" opacity="0.25"/>
    <circle cx="0" cy="-2" r="1.5" fill="#C9A84C" opacity="0.3"/>
  </g>

  <!-- Watermark -->
  <text x="400" y="1060" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#C9A84C" opacity="0.25" letter-spacing="4">FUNERALPRESS</text>
</svg>