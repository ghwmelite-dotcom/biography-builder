<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 800" width="1100" height="800">
  <defs>
    <linearGradient id="bannerBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5C1A2A"/>
      <stop offset="40%" stop-color="#4A1522"/>
      <stop offset="100%" stop-color="#3A0F1A"/>
    </linearGradient>
    <linearGradient id="bannerOverlay" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5C1A2A" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#7A2A3A" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#5C1A2A" stop-opacity="0.3"/>
    </linearGradient>
    <radialGradient id="bannerGlow" cx="35%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#7A2A3A" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="photoGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6A2030"/>
      <stop offset="100%" stop-color="#4A1522"/>
    </radialGradient>
    <filter id="bShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <filter id="bTextShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <linearGradient id="ivoryGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF5ED"/>
      <stop offset="100%" stop-color="#F0E8D8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1100" height="800" fill="url(#bannerBg)"/>
  <rect width="1100" height="800" fill="url(#bannerGlow)"/>
  <rect width="1100" height="800" fill="url(#bannerOverlay)"/>

  <!-- Top and bottom decorative borders -->
  <rect x="0" y="0" width="1100" height="4" fill="#F5F0E8" opacity="0.15"/>
  <rect x="0" y="796" width="1100" height="4" fill="#F5F0E8" opacity="0.15"/>
  <rect x="40" y="20" width="1020" height="1" fill="#F5F0E8" opacity="0.1"/>
  <rect x="40" y="779" width="1020" height="1" fill="#F5F0E8" opacity="0.1"/>

  <!-- Decorative line elements - horizontal -->
  <line x1="60" y1="55" x2="1040" y2="55" stroke="#F5F0E8" stroke-width="0.3" opacity="0.15"/>
  <line x1="60" y1="745" x2="1040" y2="745" stroke="#F5F0E8" stroke-width="0.3" opacity="0.15"/>

  <!-- Left section - Photo placeholder -->
  <g transform="translate(250, 400)" filter="url(#bShadow)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="155" fill="none" stroke="#F5F0E8" stroke-width="1.5" opacity="0.3"/>
    <!-- Decorative dashes on circle -->
    <circle cx="0" cy="0" r="145" fill="none" stroke="#F5F0E8" stroke-width="0.5" stroke-dasharray="8,12" opacity="0.2"/>
    <!-- Photo circle -->
    <circle cx="0" cy="0" r="130" fill="url(#photoGrad)" stroke="#F5F0E8" stroke-width="2"/>
    <!-- Inner decorative circle -->
    <circle cx="0" cy="0" r="120" fill="none" stroke="#F5F0E8" stroke-width="0.5" opacity="0.3"/>

    <!-- Initials placeholder -->
    <text x="0" y="-10" text-anchor="middle" font-family="Georgia, 'Palatino Linotype', serif" font-size="52" fill="#F5F0E8" opacity="0.5" font-style="italic">G</text>
    <text x="-22" y="30" text-anchor="middle" font-family="Georgia, serif" font-size="32" fill="#F5F0E8" opacity="0.35" font-style="italic">A</text>
    <text x="24" y="30" text-anchor="middle" font-family="Georgia, serif" font-size="32" fill="#F5F0E8" opacity="0.35" font-style="italic">J</text>

    <!-- "Photo" label -->
    <text x="0" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#F5F0E8" opacity="0.3" letter-spacing="2">PHOTO</text>
  </g>

  <!-- Vertical divider -->
  <line x1="470" y1="120" x2="470" y2="680" stroke="#F5F0E8" stroke-width="0.5" opacity="0.2"/>
  <!-- Decorative diamond on divider -->
  <g transform="translate(470, 400)">
    <path d="M0,-10 L6,0 L0,10 L-6,0 Z" fill="#F5F0E8" opacity="0.2"/>
  </g>

  <!-- Right section - Text content -->
  <g transform="translate(780, 200)">
    <!-- Small cross -->
    <g transform="translate(0, 0)">
      <rect x="-2" y="-15" width="4" height="30" rx="1" fill="#F5F0E8" opacity="0.5"/>
      <rect x="-10" y="-7" width="20" height="4" rx="1" fill="#F5F0E8" opacity="0.5"/>
    </g>
  </g>

  <!-- Heading -->
  <text x="780" y="265" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#F5F0E8" letter-spacing="5" opacity="0.6">IN LOVING MEMORY</text>

  <!-- Decorative line -->
  <g transform="translate(780, 285)">
    <line x1="-120" y1="0" x2="-10" y2="0" stroke="#F5F0E8" stroke-width="0.5" opacity="0.4"/>
    <line x1="10" y1="0" x2="120" y2="0" stroke="#F5F0E8" stroke-width="0.5" opacity="0.4"/>
    <circle cx="0" cy="0" r="2.5" fill="#F5F0E8" opacity="0.3"/>
  </g>

  <!-- Name -->
  <text x="780" y="340" text-anchor="middle" font-family="Georgia, 'Palatino Linotype', serif" font-size="38" fill="#F5F0E8" filter="url(#bTextShadow)">Grace Amara</text>
  <text x="780" y="385" text-anchor="middle" font-family="Georgia, 'Palatino Linotype', serif" font-size="38" fill="#F5F0E8" filter="url(#bTextShadow)">Johnson</text>

  <!-- Dates -->
  <text x="780" y="430" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#F5F0E8" opacity="0.7" letter-spacing="2">1950 — 2025</text>

  <!-- Decorative line -->
  <g transform="translate(780, 460)">
    <line x1="-100" y1="0" x2="-5" y2="0" stroke="#F5F0E8" stroke-width="0.4" opacity="0.3"/>
    <line x1="5" y1="0" x2="100" y2="0" stroke="#F5F0E8" stroke-width="0.4" opacity="0.3"/>
    <path d="M-4,-3 L0,3 L4,-3" fill="none" stroke="#F5F0E8" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- Scripture -->
  <text x="780" y="505" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#F5F0E8" font-style="italic" opacity="0.8">"Precious in the sight of the Lord</text>
  <text x="780" y="528" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#F5F0E8" font-style="italic" opacity="0.8">is the death of His faithful servants."</text>
  <text x="780" y="558" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#F5F0E8" opacity="0.5" letter-spacing="2">— PSALM 116:15</text>

  <!-- Bottom flourish -->
  <g transform="translate(780, 610)">
    <path d="M-50,0 Q-25,-12 0,0 Q25,-12 50,0" fill="none" stroke="#F5F0E8" stroke-width="0.6" opacity="0.3"/>
    <path d="M-30,6 Q-15,-4 0,6 Q15,-4 30,6" fill="none" stroke="#F5F0E8" stroke-width="0.5" opacity="0.2"/>
  </g>

  <!-- Corner decorative elements -->
  <g fill="none" stroke="#F5F0E8" stroke-width="0.8" opacity="0.2">
    <path d="M60,70 L60,55 L75,55"/>
    <path d="M1040,70 L1040,55 L1025,55"/>
    <path d="M60,730 L60,745 L75,745"/>
    <path d="M1040,730 L1040,745 L1025,745"/>
  </g>

  <!-- Watermark -->
  <text x="550" y="775" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#F5F0E8" opacity="0.2" letter-spacing="4">FUNERALPRESS</text>
</svg>