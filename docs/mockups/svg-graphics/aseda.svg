<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1100" width="800" height="1100">
  <defs>
    <linearGradient id="asedaBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F0F0F"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="aGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0C86C"/>
      <stop offset="50%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#A88A3A"/>
    </linearGradient>

    <!-- Kente pattern definitions -->
    <pattern id="kenteH" x="0" y="0" width="60" height="20" patternUnits="userSpaceOnUse">
      <!-- Gold stripe -->
      <rect x="0" y="0" width="60" height="5" fill="#C9A84C"/>
      <!-- Red stripe -->
      <rect x="0" y="5" width="60" height="5" fill="#C83030"/>
      <!-- Green stripe -->
      <rect x="0" y="10" width="60" height="5" fill="#1B4332"/>
      <!-- Black stripe -->
      <rect x="0" y="15" width="60" height="5" fill="#0A0A0A"/>
    </pattern>

    <pattern id="kenteZigzag" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M0,15 L15,0 L30,15 L15,30 Z" fill="none" stroke="#C9A84C" stroke-width="1.5"/>
      <path d="M0,15 L15,5 L30,15 L15,25 Z" fill="#C83030" opacity="0.3"/>
      <rect x="12" y="12" width="6" height="6" fill="#1B4332" opacity="0.5"/>
    </pattern>

    <pattern id="kenteDiamond" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M12,2 L22,12 L12,22 L2,12 Z" fill="none" stroke="#C9A84C" stroke-width="1"/>
      <path d="M12,6 L18,12 L12,18 L6,12 Z" fill="#C83030" opacity="0.25"/>
      <rect x="10" y="10" width="4" height="4" fill="#1B4332" opacity="0.4"/>
    </pattern>

    <filter id="aShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="aGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="aPhotoGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="1100" fill="url(#asedaBg)"/>

  <!-- Kente border - Top -->
  <g>
    <!-- Top outer border: horizontal stripes -->
    <rect x="30" y="30" width="740" height="28" fill="url(#kenteH)" opacity="0.9"/>
    <!-- Top zigzag row -->
    <rect x="30" y="58" width="740" height="30" fill="url(#kenteZigzag)" opacity="0.8"/>
  </g>

  <!-- Kente border - Bottom -->
  <g>
    <rect x="30" y="1042" width="740" height="28" fill="url(#kenteH)" opacity="0.9"/>
    <rect x="30" y="1012" width="740" height="30" fill="url(#kenteZigzag)" opacity="0.8"/>
  </g>

  <!-- Kente border - Left -->
  <g>
    <rect x="30" y="88" width="28" height="924" fill="url(#kenteDiamond)" opacity="0.8"/>
    <!-- Left stripe accent -->
    <rect x="58" y="88" width="5" height="924" fill="#C9A84C" opacity="0.3"/>
    <rect x="63" y="88" width="3" height="924" fill="#C83030" opacity="0.3"/>
    <rect x="66" y="88" width="3" height="924" fill="#1B4332" opacity="0.3"/>
  </g>

  <!-- Kente border - Right -->
  <g>
    <rect x="742" y="88" width="28" height="924" fill="url(#kenteDiamond)" opacity="0.8"/>
    <rect x="737" y="88" width="5" height="924" fill="#C9A84C" opacity="0.3"/>
    <rect x="734" y="88" width="3" height="924" fill="#C83030" opacity="0.3"/>
    <rect x="731" y="88" width="3" height="924" fill="#1B4332" opacity="0.3"/>
  </g>

  <!-- Inner decorative kente accents - top corners -->
  <g transform="translate(85, 105)">
    <!-- Small kente block top-left -->
    <rect width="40" height="8" fill="#C9A84C" opacity="0.4"/>
    <rect y="8" width="40" height="8" fill="#C83030" opacity="0.3"/>
    <rect y="16" width="40" height="8" fill="#1B4332" opacity="0.4"/>
  </g>
  <g transform="translate(675, 105)">
    <rect width="40" height="8" fill="#C9A84C" opacity="0.4"/>
    <rect y="8" width="40" height="8" fill="#C83030" opacity="0.3"/>
    <rect y="16" width="40" height="8" fill="#1B4332" opacity="0.4"/>
  </g>

  <!-- Inner border line -->
  <rect x="80" y="98" width="640" height="904" rx="2" fill="none" stroke="#C9A84C" stroke-width="0.8" opacity="0.3"/>

  <!-- Title area -->
  <text x="400" y="175" text-anchor="middle" font-family="Georgia, 'Palatino Linotype', serif" font-size="14" fill="#C9A84C" letter-spacing="6" opacity="0.7">ASEDA</text>
  <text x="400" y="200" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#C9A84C" opacity="0.4" letter-spacing="3">MEMORIAL TRIBUTE</text>

  <!-- Gold ornamental divider -->
  <g transform="translate(400, 225)">
    <line x1="-120" y1="0" x2="-15" y2="0" stroke="#C9A84C" stroke-width="0.8"/>
    <line x1="15" y1="0" x2="120" y2="0" stroke="#C9A84C" stroke-width="0.8"/>
    <!-- Adinkra-inspired center symbol (Sankofa simplified) -->
    <path d="M-8,-6 Q0,6 8,-6" fill="none" stroke="#C9A84C" stroke-width="1"/>
    <path d="M-8,6 Q0,-6 8,6" fill="none" stroke="#C9A84C" stroke-width="1"/>
    <circle cx="0" cy="0" r="2.5" fill="#C9A84C"/>
  </g>

  <!-- Photo placeholder circle -->
  <g transform="translate(400, 400)" filter="url(#aShadow)">
    <!-- Outer kente-inspired ring -->
    <circle cx="0" cy="0" r="118" fill="none" stroke="#C9A84C" stroke-width="3"/>
    <circle cx="0" cy="0" r="112" fill="none" stroke="#C83030" stroke-width="2" stroke-dasharray="6,4"/>
    <circle cx="0" cy="0" r="106" fill="none" stroke="#1B4332" stroke-width="2"/>
    <!-- Photo circle -->
    <circle cx="0" cy="0" r="98" fill="url(#aPhotoGrad)" stroke="#C9A84C" stroke-width="1"/>

    <!-- Initials -->
    <text x="0" y="-10" text-anchor="middle" font-family="Georgia, serif" font-size="48" fill="#C9A84C" opacity="0.5" font-style="italic" font-weight="bold">G</text>
    <text x="-20" y="28" text-anchor="middle" font-family="Georgia, serif" font-size="30" fill="#C9A84C" opacity="0.35" font-style="italic">A</text>
    <text x="22" y="28" text-anchor="middle" font-family="Georgia, serif" font-size="30" fill="#C9A84C" opacity="0.35" font-style="italic">J</text>
  </g>

  <!-- Name -->
  <g filter="url(#aGlow)">
    <text x="400" y="560" text-anchor="middle" font-family="Georgia, 'Palatino Linotype', serif" font-size="34" fill="#C9A84C" font-weight="bold">Grace Amara Johnson</text>
  </g>

  <!-- Kente strip divider -->
  <g transform="translate(200, 580)">
    <rect width="400" height="4" fill="#C9A84C" opacity="0.5"/>
    <rect y="4" width="400" height="3" fill="#C83030" opacity="0.4"/>
    <rect y="7" width="400" height="3" fill="#1B4332" opacity="0.5"/>
    <rect y="10" width="400" height="2" fill="#C9A84C" opacity="0.3"/>
  </g>

  <!-- Dates -->
  <text x="400" y="620" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#C9A84C" opacity="0.7" letter-spacing="2">March 12, 1950 — January 8, 2025</text>

  <!-- Ornamental divider -->
  <g transform="translate(400, 650)">
    <line x1="-100" y1="0" x2="-8" y2="0" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="8" y1="0" x2="100" y2="0" stroke="#C9A84C" stroke-width="0.5"/>
    <path d="M-6,0 L0,-5 L6,0 L0,5 Z" fill="#C83030" opacity="0.5"/>
  </g>

  <!-- Tribute quote -->
  <text x="400" y="700" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#FFFFFF" font-style="italic" opacity="0.8">"A woman of grace, strength, and unwavering faith.</text>
  <text x="400" y="728" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#FFFFFF" font-style="italic" opacity="0.8">Her legacy of love lives on in all she touched."</text>

  <!-- Small Adinkra-inspired symbols row -->
  <g transform="translate(400, 780)">
    <!-- Gye Nyame simplified -->
    <g transform="translate(-80, 0)">
      <path d="M-8,0 Q-4,-8 0,-4 Q4,-8 8,0 Q4,8 0,4 Q-4,8 -8,0Z" fill="none" stroke="#C9A84C" stroke-width="0.8" opacity="0.4"/>
    </g>
    <!-- Center diamond -->
    <path d="M0,-8 L8,0 L0,8 L-8,0 Z" fill="none" stroke="#C9A84C" stroke-width="0.8" opacity="0.4"/>
    <path d="M0,-4 L4,0 L0,4 L-4,0 Z" fill="#C9A84C" opacity="0.15"/>
    <!-- Right symbol -->
    <g transform="translate(80, 0)">
      <path d="M-8,0 Q-4,-8 0,-4 Q4,-8 8,0 Q4,8 0,4 Q-4,8 -8,0Z" fill="none" stroke="#C9A84C" stroke-width="0.8" opacity="0.4"/>
    </g>
  </g>

  <!-- Family tribute -->
  <text x="400" y="835" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#C9A84C" opacity="0.5" letter-spacing="3">GONE BUT NEVER FORGOTTEN</text>

  <!-- Scripture -->
  <text x="400" y="880" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#FFFFFF" font-style="italic" opacity="0.6">"Well done, good and faithful servant."</text>
  <text x="400" y="905" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#C9A84C" opacity="0.4" letter-spacing="2">— MATTHEW 25:23</text>

  <!-- Bottom kente accent strip -->
  <g transform="translate(250, 940)">
    <rect width="300" height="3" fill="#C9A84C" opacity="0.4"/>
    <rect y="3" width="300" height="2" fill="#C83030" opacity="0.3"/>
    <rect y="5" width="300" height="2" fill="#1B4332" opacity="0.4"/>
  </g>

  <!-- Family -->
  <text x="400" y="975" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#C9A84C" opacity="0.5">The Johnson Family</text>

  <!-- Watermark -->
  <text x="400" y="1080" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#C9A84C" opacity="0.2" letter-spacing="4">FUNERALPRESS</text>
</svg>