<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1100" width="800" height="1100">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F0F0F"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4B85C"/>
      <stop offset="50%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#A8893C"/>
    </linearGradient>
    <linearGradient id="goldShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8D07C"/>
      <stop offset="50%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#9A7B3A"/>
    </linearGradient>
    <filter id="shadow1" x="-10%" y="-5%" width="130%" height="120%">
      <feDropShadow dx="8" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    <filter id="shadow2" x="-10%" y="-5%" width="130%" height="120%">
      <feDropShadow dx="4" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="goldGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="pageClip">
      <rect x="0" y="0" width="340" height="480" rx="3"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="1100" fill="url(#bgGrad)"/>

  <!-- Subtle radial light -->
  <radialGradient id="centerLight" cx="50%" cy="40%" r="60%">
    <stop offset="0%" stop-color="#1A1A1A"/>
    <stop offset="100%" stop-color="#0A0A0A"/>
  </radialGradient>
  <rect width="800" height="1100" fill="url(#centerLight)"/>

  <!-- Title area -->
  <text x="400" y="80" text-anchor="middle" font-family="Georgia, 'Palatino Linotype', serif" font-size="16" fill="#C9A84C" letter-spacing="6" opacity="0.8">FUNERALPRESS PRODUCT SHOWCASE</text>
  <line x1="200" y1="95" x2="600" y2="95" stroke="#C9A84C" stroke-width="0.5" opacity="0.4"/>

  <!-- Back page (rightmost, behind) -->
  <g transform="translate(310, 160) rotate(8, 170, 240)" filter="url(#shadow1)">
    <rect width="340" height="480" rx="3" fill="#1A1714"/>
    <rect x="4" y="4" width="332" height="472" rx="2" fill="none" stroke="#C9A84C" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- Middle page -->
  <g transform="translate(280, 155) rotate(4, 170, 240)" filter="url(#shadow2)">
    <rect width="340" height="480" rx="3" fill="#1C1916"/>
    <rect x="6" y="6" width="328" height="468" rx="2" fill="none" stroke="#C9A84C" stroke-width="0.5" opacity="0.4"/>
    <!-- Some interior content lines -->
    <rect x="30" y="40" width="120" height="3" rx="1" fill="#C9A84C" opacity="0.2"/>
    <rect x="30" y="60" width="280" height="2" rx="1" fill="#C9A84C" opacity="0.1"/>
    <rect x="30" y="72" width="260" height="2" rx="1" fill="#C9A84C" opacity="0.1"/>
    <rect x="30" y="84" width="270" height="2" rx="1" fill="#C9A84C" opacity="0.1"/>
    <rect x="30" y="96" width="240" height="2" rx="1" fill="#C9A84C" opacity="0.1"/>
    <rect x="30" y="130" width="280" height="2" rx="1" fill="#C9A84C" opacity="0.1"/>
    <rect x="30" y="142" width="250" height="2" rx="1" fill="#C9A84C" opacity="0.1"/>
    <rect x="30" y="154" width="270" height="2" rx="1" fill="#C9A84C" opacity="0.1"/>
  </g>

  <!-- Front cover page -->
  <g transform="translate(250, 150)" filter="url(#shadow1)">
    <rect width="340" height="480" rx="3" fill="#0E0C0A"/>

    <!-- Gold double border -->
    <rect x="12" y="12" width="316" height="456" rx="2" fill="none" stroke="url(#goldGrad)" stroke-width="1.5"/>
    <rect x="18" y="18" width="304" height="444" rx="2" fill="none" stroke="url(#goldGrad)" stroke-width="0.5"/>

    <!-- Corner ornaments - Top Left -->
    <g transform="translate(12, 12)">
      <path d="M0,30 L0,0 L30,0" fill="none" stroke="#C9A84C" stroke-width="2.5"/>
      <path d="M5,20 Q5,5 20,5" fill="none" stroke="#C9A84C" stroke-width="1"/>
      <circle cx="5" cy="5" r="2" fill="#C9A84C"/>
    </g>
    <!-- Corner ornaments - Top Right -->
    <g transform="translate(328, 12)">
      <path d="M0,0 L0,30" fill="none" stroke="#C9A84C" stroke-width="2.5"/>
      <path d="M0,0 L-30,0" fill="none" stroke="#C9A84C" stroke-width="2.5"/>
      <path d="M-5,20 Q-5,5 -20,5" fill="none" stroke="#C9A84C" stroke-width="1"/>
      <circle cx="-5" cy="5" r="2" fill="#C9A84C"/>
    </g>
    <!-- Corner ornaments - Bottom Left -->
    <g transform="translate(12, 468)">
      <path d="M0,-30 L0,0 L30,0" fill="none" stroke="#C9A84C" stroke-width="2.5"/>
      <path d="M5,-20 Q5,-5 20,-5" fill="none" stroke="#C9A84C" stroke-width="1"/>
      <circle cx="5" cy="-5" r="2" fill="#C9A84C"/>
    </g>
    <!-- Corner ornaments - Bottom Right -->
    <g transform="translate(328, 468)">
      <path d="M0,0 L0,-30" fill="none" stroke="#C9A84C" stroke-width="2.5"/>
      <path d="M0,0 L-30,0" fill="none" stroke="#C9A84C" stroke-width="2.5"/>
      <path d="M-5,-20 Q-5,-5 -20,-5" fill="none" stroke="#C9A84C" stroke-width="1"/>
      <circle cx="-5" cy="-5" r="2" fill="#C9A84C"/>
    </g>

    <!-- Cross symbol -->
    <g transform="translate(170, 100)" filter="url(#goldGlow)">
      <rect x="-3" y="-30" width="6" height="60" rx="1" fill="url(#goldShine)"/>
      <rect x="-18" y="-15" width="36" height="6" rx="1" fill="url(#goldShine)"/>
    </g>

    <!-- Ornamental divider -->
    <g transform="translate(170, 150)">
      <line x1="-80" y1="0" x2="-15" y2="0" stroke="#C9A84C" stroke-width="0.8"/>
      <line x1="15" y1="0" x2="80" y2="0" stroke="#C9A84C" stroke-width="0.8"/>
      <path d="M-10,-5 Q0,5 10,-5" fill="none" stroke="#C9A84C" stroke-width="0.8"/>
      <circle cx="0" cy="-2" r="2" fill="#C9A84C"/>
    </g>

    <!-- Text content -->
    <text x="170" y="190" text-anchor="middle" font-family="Georgia, 'Palatino Linotype', serif" font-size="11" fill="#C9A84C" letter-spacing="5">CELEBRATION OF LIFE</text>

    <!-- Another divider -->
    <line x1="80" y1="208" x2="260" y2="208" stroke="#C9A84C" stroke-width="0.3"/>

    <text x="170" y="245" text-anchor="middle" font-family="Georgia, 'Palatino Linotype', serif" font-size="12" fill="#C9A84C" opacity="0.7" font-style="italic">In Loving Memory of</text>

    <text x="170" y="285" text-anchor="middle" font-family="Georgia, 'Palatino Linotype', serif" font-size="24" fill="url(#goldShine)" font-weight="bold">Grace Amara</text>
    <text x="170" y="318" text-anchor="middle" font-family="Georgia, 'Palatino Linotype', serif" font-size="24" fill="url(#goldShine)" font-weight="bold">Johnson</text>

    <!-- Ornamental divider -->
    <g transform="translate(170, 345)">
      <line x1="-60" y1="0" x2="-10" y2="0" stroke="#C9A84C" stroke-width="0.8"/>
      <line x1="10" y1="0" x2="60" y2="0" stroke="#C9A84C" stroke-width="0.8"/>
      <path d="M-8,0 L0,-6 L8,0 L0,6 Z" fill="#C9A84C" opacity="0.6"/>
    </g>

    <text x="170" y="380" text-anchor="middle" font-family="Georgia, 'Palatino Linotype', serif" font-size="16" fill="#C9A84C" letter-spacing="3">1950 — 2025</text>

    <!-- Small decorative element -->
    <g transform="translate(170, 420)">
      <path d="M-30,0 Q-15,-10 0,0 Q15,-10 30,0" fill="none" stroke="#C9A84C" stroke-width="0.6" opacity="0.5"/>
      <path d="M-20,5 Q-10,-3 0,5 Q10,-3 20,5" fill="none" stroke="#C9A84C" stroke-width="0.6" opacity="0.3"/>
    </g>
  </g>

  <!-- Product label -->
  <text x="400" y="690" text-anchor="middle" font-family="Georgia, 'Palatino Linotype', serif" font-size="22" fill="#C9A84C" letter-spacing="4">MEMORIAL BROCHURE</text>
  <line x1="250" y1="705" x2="550" y2="705" stroke="#C9A84C" stroke-width="0.5" opacity="0.4"/>

  <!-- Description text -->
  <text x="400" y="740" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#888888">Multi-page tri-fold brochure with premium gold foil accents</text>
  <text x="400" y="760" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#888888">Printed on 300gsm silk-finish card stock</text>

  <!-- Feature bullets -->
  <g transform="translate(240, 800)">
    <circle cx="0" cy="-4" r="2" fill="#C9A84C"/>
    <text x="12" y="0" font-family="system-ui, sans-serif" font-size="11" fill="#666666">Custom photo integration</text>
  </g>
  <g transform="translate(240, 825)">
    <circle cx="0" cy="-4" r="2" fill="#C9A84C"/>
    <text x="12" y="0" font-family="system-ui, sans-serif" font-size="11" fill="#666666">Order of service included</text>
  </g>
  <g transform="translate(240, 850)">
    <circle cx="0" cy="-4" r="2" fill="#C9A84C"/>
    <text x="12" y="0" font-family="system-ui, sans-serif" font-size="11" fill="#666666">Available in 6 premium colour themes</text>
  </g>
  <g transform="translate(240, 875)">
    <circle cx="0" cy="-4" r="2" fill="#C9A84C"/>
    <text x="12" y="0" font-family="system-ui, sans-serif" font-size="11" fill="#666666">Digital &amp; print-ready formats</text>
  </g>

  <!-- Bottom decorative line -->
  <line x1="100" y1="950" x2="700" y2="950" stroke="#C9A84C" stroke-width="0.3" opacity="0.3"/>

  <!-- Watermark -->
  <text x="400" y="1070" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#C9A84C" opacity="0.35" letter-spacing="4">FUNERALPRESS</text>
  <text x="400" y="1088" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#555555" opacity="0.4">www.funeralpress.com</text>
</svg>