<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1100" width="800" height="1100">
  <defs>
    <linearGradient id="invBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDF8F6"/>
      <stop offset="100%" stop-color="#F8F0EC"/>
    </linearGradient>
    <linearGradient id="roseGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A0A0"/>
      <stop offset="100%" stop-color="#C08888"/>
    </linearGradient>
    <radialGradient id="invGlow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#F5E8E4" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="iShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#5C1A2A" flood-opacity="0.12"/>
    </filter>
    <filter id="iTextShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#5C1A2A" flood-opacity="0.15"/>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#5C1A2A" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Outer background -->
  <rect width="800" height="1100" fill="#E8D8D4"/>

  <!-- Card body -->
  <g filter="url(#iShadow)">
    <rect x="60" y="60" width="680" height="980" rx="6" fill="url(#invBg)"/>
  </g>
  <rect x="60" y="60" width="680" height="980" rx="6" fill="url(#invGlow)"/>

  <!-- Ornate border -->
  <rect x="80" y="80" width="640" height="940" rx="4" fill="none" stroke="#D4A0A0" stroke-width="1.5"/>
  <rect x="88" y="88" width="624" height="924" rx="3" fill="none" stroke="#D4A0A0" stroke-width="0.5" opacity="0.5"/>

  <!-- Floral corner decorations - Top Left -->
  <g transform="translate(88, 88)" fill="none" stroke="#D4A0A0" stroke-width="0.8">
    <path d="M0,40 Q0,0 40,0" stroke-width="1.2"/>
    <path d="M5,30 Q5,5 30,5"/>
    <path d="M10,20 Q10,10 20,10" stroke-width="0.5"/>
    <!-- Leaf/petal shapes -->
    <path d="M3,15 Q8,8 15,3" stroke-width="0.6"/>
    <ellipse cx="8" cy="8" rx="5" ry="3" transform="rotate(-45,8,8)" fill="#D4A0A0" opacity="0.15" stroke="none"/>
    <circle cx="5" cy="5" r="2.5" fill="#D4A0A0" opacity="0.2" stroke="none"/>
    <!-- Small bud shapes -->
    <path d="M20,2 Q22,-3 24,2" fill="#D4A0A0" opacity="0.15" stroke-width="0.4"/>
    <path d="M2,20 Q-3,22 2,24" fill="#D4A0A0" opacity="0.15" stroke-width="0.4"/>
  </g>

  <!-- Floral corner - Top Right -->
  <g transform="translate(712, 88) scale(-1,1)" fill="none" stroke="#D4A0A0" stroke-width="0.8">
    <path d="M0,40 Q0,0 40,0" stroke-width="1.2"/>
    <path d="M5,30 Q5,5 30,5"/>
    <path d="M10,20 Q10,10 20,10" stroke-width="0.5"/>
    <path d="M3,15 Q8,8 15,3" stroke-width="0.6"/>
    <ellipse cx="8" cy="8" rx="5" ry="3" transform="rotate(-45,8,8)" fill="#D4A0A0" opacity="0.15" stroke="none"/>
    <circle cx="5" cy="5" r="2.5" fill="#D4A0A0" opacity="0.2" stroke="none"/>
    <path d="M20,2 Q22,-3 24,2" fill="#D4A0A0" opacity="0.15" stroke-width="0.4"/>
    <path d="M2,20 Q-3,22 2,24" fill="#D4A0A0" opacity="0.15" stroke-width="0.4"/>
  </g>

  <!-- Floral corner - Bottom Left -->
  <g transform="translate(88, 1012) scale(1,-1)" fill="none" stroke="#D4A0A0" stroke-width="0.8">
    <path d="M0,40 Q0,0 40,0" stroke-width="1.2"/>
    <path d="M5,30 Q5,5 30,5"/>
    <path d="M10,20 Q10,10 20,10" stroke-width="0.5"/>
    <path d="M3,15 Q8,8 15,3" stroke-width="0.6"/>
    <ellipse cx="8" cy="8" rx="5" ry="3" transform="rotate(-45,8,8)" fill="#D4A0A0" opacity="0.15" stroke="none"/>
    <circle cx="5" cy="5" r="2.5" fill="#D4A0A0" opacity="0.2" stroke="none"/>
  </g>

  <!-- Floral corner - Bottom Right -->
  <g transform="translate(712, 1012) scale(-1,-1)" fill="none" stroke="#D4A0A0" stroke-width="0.8">
    <path d="M0,40 Q0,0 40,0" stroke-width="1.2"/>
    <path d="M5,30 Q5,5 30,5"/>
    <path d="M10,20 Q10,10 20,10" stroke-width="0.5"/>
    <path d="M3,15 Q8,8 15,3" stroke-width="0.6"/>
    <ellipse cx="8" cy="8" rx="5" ry="3" transform="rotate(-45,8,8)" fill="#D4A0A0" opacity="0.15" stroke="none"/>
    <circle cx="5" cy="5" r="2.5" fill="#D4A0A0" opacity="0.2" stroke="none"/>
  </g>

  <!-- Small cross at top -->
  <g transform="translate(400, 160)">
    <rect x="-1.5" y="-12" width="3" height="24" rx="0.5" fill="#5C1A2A" opacity="0.5"/>
    <rect x="-8" y="-5" width="16" height="3" rx="0.5" fill="#5C1A2A" opacity="0.5"/>
  </g>

  <!-- "You Are Cordially Invited" -->
  <text x="400" y="230" text-anchor="middle" font-family="Georgia, 'Palatino Linotype', serif" font-size="14" fill="#5C1A2A" opacity="0.5" letter-spacing="4">TO THE</text>

  <text x="400" y="280" text-anchor="middle" font-family="Georgia, 'Palatino Linotype', serif" font-size="32" fill="#5C1A2A" font-style="italic" filter="url(#iTextShadow)">You Are Cordially Invited</text>

  <!-- Decorative flourish -->
  <g transform="translate(400, 305)">
    <path d="M-80,0 Q-40,-15 0,0 Q40,-15 80,0" fill="none" stroke="#D4A0A0" stroke-width="1"/>
    <path d="M-50,5 Q-25,-8 0,5 Q25,-8 50,5" fill="none" stroke="#D4A0A0" stroke-width="0.6" opacity="0.5"/>
    <circle cx="0" cy="-3" r="2" fill="#D4A0A0" opacity="0.5"/>
  </g>

  <!-- To the memorial service -->
  <text x="400" y="360" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#5C1A2A" opacity="0.6" letter-spacing="3">MEMORIAL SERVICE FOR</text>

  <!-- Name -->
  <text x="400" y="415" text-anchor="middle" font-family="Georgia, 'Palatino Linotype', serif" font-size="36" fill="#5C1A2A" font-weight="bold">Grace Amara Johnson</text>

  <!-- Dates -->
  <text x="400" y="455" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#D4A0A0" letter-spacing="2">March 12, 1950 — January 8, 2025</text>

  <!-- Divider -->
  <g transform="translate(400, 490)">
    <line x1="-150" y1="0" x2="-10" y2="0" stroke="#D4A0A0" stroke-width="0.6"/>
    <line x1="10" y1="0" x2="150" y2="0" stroke="#D4A0A0" stroke-width="0.6"/>
    <path d="M-6,0 L0,-5 L6,0 L0,5 Z" fill="#D4A0A0" opacity="0.5"/>
  </g>

  <!-- Service details -->
  <text x="400" y="545" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#5C1A2A" opacity="0.5" letter-spacing="4">DATE</text>
  <text x="400" y="572" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#5C1A2A">Saturday, January 18, 2025</text>

  <text x="400" y="620" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#5C1A2A" opacity="0.5" letter-spacing="4">TIME</text>
  <text x="400" y="647" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#5C1A2A">10:00 AM</text>

  <text x="400" y="695" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#5C1A2A" opacity="0.5" letter-spacing="4">VENUE</text>
  <text x="400" y="722" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#5C1A2A">Grace Community Chapel</text>
  <text x="400" y="748" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#5C1A2A" opacity="0.6">123 Peaceful Lane, Accra, Ghana</text>

  <!-- Divider -->
  <g transform="translate(400, 790)">
    <line x1="-120" y1="0" x2="-5" y2="0" stroke="#D4A0A0" stroke-width="0.5"/>
    <line x1="5" y1="0" x2="120" y2="0" stroke="#D4A0A0" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="2" fill="#D4A0A0" opacity="0.4"/>
  </g>

  <!-- Reception info -->
  <text x="400" y="830" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#5C1A2A" font-style="italic" opacity="0.7">Reception to follow at the family residence</text>

  <!-- RSVP -->
  <text x="400" y="885" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#D4A0A0" letter-spacing="4">KINDLY RSVP</text>
  <text x="400" y="910" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#5C1A2A" opacity="0.6">Contact: The Johnson Family</text>
  <text x="400" y="930" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#5C1A2A" opacity="0.6">+233 XX XXX XXXX</text>

  <!-- Bottom flourish -->
  <g transform="translate(400, 970)">
    <path d="M-60,0 Q-30,-10 0,0 Q30,-10 60,0" fill="none" stroke="#D4A0A0" stroke-width="0.7" opacity="0.5"/>
    <path d="M-35,4 Q-17,-5 0,4 Q17,-5 35,4" fill="none" stroke="#D4A0A0" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- Watermark -->
  <text x="400" y="1020" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#D4A0A0" opacity="0.35" letter-spacing="4">FUNERALPRESS</text>
</svg>