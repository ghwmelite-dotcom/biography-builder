name: Deploy FuneralPress

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx eslint src/ workers/ --max-warnings 0

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx vitest run

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy-frontend:
    name: Deploy Frontend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ea2eb3a9813660dfca2a60e594858538
          command: pages deploy dist --project-name=funeral-brochure-app

  deploy-workers:
    name: Deploy Workers
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ea2eb3a9813660dfca2a60e594858538
          command: deploy --config workers/auth-api-wrangler.toml
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ea2eb3a9813660dfca2a60e594858538
          command: deploy --config workers/memorial-wrangler.toml
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ea2eb3a9813660dfca2a60e594858538
          command: deploy --config workers/live-service-wrangler.toml
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ea2eb3a9813660dfca2a60e594858538
          command: deploy --config workers/share-wrangler.toml
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ea2eb3a9813660dfca2a60e594858538
          command: deploy --config workers/twitter-bot-wrangler.toml
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ea2eb3a9813660dfca2a60e594858538
          command: deploy --config workers/donation-api-wrangler.toml
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ea2eb3a9813660dfca2a60e594858538
          command: deploy --config workers/brochure-ai-writer-wrangler.toml

  smoke:
    # Post-deploy smoke check. Confirms the just-deployed code actually
    # serves: each worker /health is 200 (proves the deploy landed AND the
    # binding-graph is healthy), and bad-credential auth requests return the
    # right error codes (proves the routes parse the body, hit D1, and don't
    # 5xx on a malformed input).
    #
    # Runs only on push-to-main, after both deploy jobs succeed. Failure
    # surfaces in the Actions tab AND the notify job below; it does NOT
    # roll back the deploy (rollback is manual — see DEPLOY_AND_ROLLBACK.md).
    name: Post-deploy smoke
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-workers]
    timeout-minutes: 3
    steps:
      - name: Probe /health on each worker
        shell: bash
        run: |
          set +e
          declare -a TARGETS=(
            "auth-api|https://auth-api.funeralpress.org/health"
            "donation-api|https://donation-api.funeralpress.org/health"
            "memorial-api|https://memorial-api.funeralpress.org/health"
            "live-api|https://live-api.funeralpress.org/health"
            "share-api|https://share-api.funeralpress.org/health"
            "ai|https://ai.funeralpress.org/health"
          )
          FAIL=0
          for T in "${TARGETS[@]}"; do
            NAME="${T%%|*}"; URL="${T##*|}"
            STATUS=$(curl -sS -o /dev/null -w "%{http_code}" -m 10 "$URL" || echo 000)
            if [ "$STATUS" = "200" ]; then
              echo "✓ $NAME health 200"
            else
              echo "::error::$NAME /health returned $STATUS (expected 200) at $URL"
              FAIL=1
            fi
          done
          exit $FAIL

      - name: Probe SPA root
        shell: bash
        run: |
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" -m 10 https://funeralpress.org/ || echo 000)
          [ "$STATUS" = "200" ] || { echo "::error::SPA returned $STATUS (expected 200)"; exit 1; }
          echo "✓ SPA 200"

      - name: Probe auth contract (bad creds → 401)
        shell: bash
        run: |
          # POST a deliberately wrong phone+PIN. Worker should respond 401
          # with a JSON body — proves the route is wired, the handler runs,
          # rate limiting hasn't blocked the test IP, and D1 lookups work.
          RES=$(curl -sS -m 10 -o /tmp/body.json -w "%{http_code}" \
            -X POST 'https://auth-api.funeralpress.org/auth/phone/login' \
            -H 'Content-Type: application/json' \
            -d '{"phone":"+233200000000","pin":"0000"}' || echo 000)
          if [ "$RES" != "401" ] && [ "$RES" != "429" ]; then
            echo "::error::login bad-creds returned $RES (expected 401 or 429)"
            head -c 200 /tmp/body.json
            exit 1
          fi
          echo "✓ login bad-creds → $RES"

  notify-deploy:
    # One-shot Slack message summarising the outcome of every push-to-main
    # deploy. Fires regardless of success/failure so the channel sees the
    # full deploy stream. No-op when SLACK_WEBHOOK_URL repo secret is unset.
    name: Notify deploy outcome
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-workers, smoke]
    steps:
      - name: Compose + send Slack message
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          FRONTEND_RESULT: ${{ needs.deploy-frontend.result }}
          WORKERS_RESULT: ${{ needs.deploy-workers.result }}
          SMOKE_RESULT: ${{ needs.smoke.result }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          # Emoji per overall outcome. Smoke "skipped" can mean a deploy job
          # failed and smoke never ran — treat skipped as not-success.
          if [ "$FRONTEND_RESULT" = "success" ] && [ "$WORKERS_RESULT" = "success" ] && [ "$SMOKE_RESULT" = "success" ]; then
            ICON=":white_check_mark:"
            OUTCOME="success"
          elif [ "$SMOKE_RESULT" = "failure" ]; then
            ICON=":warning:"
            OUTCOME="deployed, smoke FAILED"
          else
            ICON=":x:"
            OUTCOME="deploy FAILED"
          fi
          # First line of the commit message only.
          FIRSTLINE=$(printf '%s' "$COMMIT_MSG" | head -n1)
          SHORT="${COMMIT_SHA:0:7}"
          TEXT="${ICON} *FuneralPress* ${OUTCOME} — \`${SHORT}\` ${FIRSTLINE} (by ${ACTOR}). <${RUN_URL}|View run>"
          PAYLOAD=$(jq -n --arg text "$TEXT" '{text:$text}')
          curl -sS -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$SLACK_WEBHOOK_URL" || true
