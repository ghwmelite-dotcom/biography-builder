name = "funeralpress-donation-api"
main = "donation-api.js"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "funeralpress-db"
database_id = "eab2488e-18cd-4920-adf8-7db724facee5"

[[kv_namespaces]]
binding = "MEMORIAL_PAGES_KV"
id = "314cc22d0bb6497d85280eccf10e54bb"

[[kv_namespaces]]
binding = "RATE_LIMITS"
id = "3cf6b47818c04ca8828461650478a6c1"

# OTP_KV binding intentionally removed — phone OTPs persist to D1
# `phone_otps`, no code path reads or writes the KV namespace.

[vars]
ENVIRONMENT = "production"
DONATIONS_ENABLED = "false"
INTERNATIONAL_DONATIONS_ENABLED = "true"
DONATIONS_GLOBAL_PAUSED = "false"
RECONCILIATION_ENABLED = "true"
TIP_DEFAULT_PERCENT = "5"

# ─── Required secrets (set via `wrangler secret put` before deploy) ───
# PAYSTACK_SECRET_KEY       — Paystack live or test secret key
# PAYSTACK_WEBHOOK_SECRET   — used to HMAC-verify Paystack webhooks
# JWT_SECRET                — same as auth-api worker (verifies JWTs issued there)
# RESEND_API_KEY            — for donation receipts + family-head invite emails
# OXR_APP_ID                — Open Exchange Rates app id (for FX rate fetch)
# SENTRY_DSN                — Sentry workers DSN (project funeralpress-workers, EU)

[triggers]
crons = ["0 4 * * *"]    # Daily reconciliation 04:00 UTC

[[routes]]
pattern = "donation-api.funeralpress.org/*"
zone_name = "funeralpress.org"
